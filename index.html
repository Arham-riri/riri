<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Umme ❤️</title>

<style>
    body {
        margin: 0;
        padding: 0;
        text-align: center;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(to right, #ff9a9e, #fad0c4);
        color: white;
        overflow: hidden;
    }

    .container {
        margin-top: 100px;
    }

    h1 {
        font-size: 40px;
    }

    p {
        font-size: 20px;
        max-width: 600px;
        margin: auto;
    }

    button {
        padding: 15px 25px;
        font-size: 18px;
        margin: 20px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
    }

    #yes {
        background-color: #ff4d6d;
        color: white;
    }

    #no {
        background-color: gray;
        color: white;
        position: absolute;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Hey Umme ❤️</h1>
    <p>
        We may not have met in person yet...  
        But every call, every message, every moment with you  
        has meant the world to me 💖  
        <br><br>
        You came into my life through a screen...  
        but somehow reached straight into my heart.
    </p>

    <h1>Umme, will you be mine forever? 💍</h1>

    <button id="yes" onclick="yesClicked()">Yes 💖</button>
    <button id="no" onmouseover="moveButton()">No 😢</button>
</div>

<script>
function yesClicked() {
    document.body.innerHTML = `
        <div style="margin-top:150px; text-align:center;">
            <h1>I love you so much Umme ❤️</h1>
            <p>
                You just made me the happiest person alive 🥰  
                I promise to always be there for you,  
                no matter the distance 💫  
            </p>
        </div>
    `;
}

function moveButton() {
    let button = document.getElementById("no");
    let x = Math.random() * window.innerWidth;
    let y = Math.random() * window.innerHeight;
    button.style.left = x + "px";
    button.style.top = y + "px";
}
</script>

</body>
</html>
